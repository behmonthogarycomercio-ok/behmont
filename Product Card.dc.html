<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<![CDATA[
<div style="display: flex; flex-direction: column; background: white; border-radius: 18px; border: 1px solid #E8EAF1; overflow: hidden; transition: box-shadow .2s, transform .2s, border-color .2s;" style-hover="box-shadow: 0 20px 40px -14px rgba(10,18,38,0.2); transform: translateY(-4px); border-color: #C3C9DA;">
  <div style="position: relative; aspect-ratio: 1/1; background: repeating-linear-gradient(135deg, rgba(17,28,56,0.05) 0px, rgba(17,28,56,0.05) 2px, transparent 2px, transparent 16px), #EEF0F2; display: flex; align-items: center; justify-content: center; overflow: hidden;">
    <sc-if value="{{ product.image }}">
      <img src="{{ product.image }}" alt="{{ product.name }}" style="width: 100%; height: 100%; object-fit: cover; transition: transform .35s;" style-hover="transform: scale(1.06);" />
    </sc-if>
    <sc-if value="{{ product.noImage }}">
      <span style="font-family: 'Inter', sans-serif; font-size: 10px; color: #9DA7C4; text-transform: uppercase; letter-spacing: 0.06em;">Foto producto</span>
    </sc-if>
    <sc-if value="{{ product.discountLabel }}">
      <span style="position: absolute; top: 12px; left: 12px; background: #ED3237; color: white; font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 700; padding: 4px 9px; border-radius: 8px;">{{ product.discountLabel }}</span>
    </sc-if>
    <sc-if value="{{ product.lowStockLabel }}">
      <span style="position: absolute; bottom: 12px; left: 12px; background: rgba(245,158,11,0.15); color: #D97706; font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 700; text-transform: uppercase; padding: 4px 9px; border-radius: 8px;">{{ product.lowStockLabel }}</span>
    </sc-if>
  </div>
  <div style="padding: 18px; display: flex; flex-direction: column; gap: 6px; flex: 1;">
    <p style="margin: 0; font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #9DA7C4;">{{ product.brand }}</p>
    <p style="margin: 0; font-size: 14.5px; font-weight: 600; color: #111C38; line-height: 1.35;">{{ product.name }}</p>
    <div style="margin-top: 8px;">
      <sc-if value="{{ product.compareAtLabel }}">
        <p style="margin: 0; font-size: 12.5px; color: #9DA7C4; text-decoration: line-through;">{{ product.compareAtLabel }}</p>
      </sc-if>
      <p style="margin: 0; font-family: 'Manrope', sans-serif; font-size: 22px; font-weight: 700; color: #0A1226; letter-spacing: -0.01em;">{{ product.priceLabel }}</p>
      <p style="margin: 3px 0 0; font-size: 12px; font-weight: 600; color: #059669;">{{ product.cuotaLabel }}</p>
    </div>
    <button style="margin-top: 14px; height: 42px; border-radius: 12px; background: linear-gradient(180deg, #182548 0%, #111C38 100%); color: white; border: none; font-family: Inter, sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; box-shadow: 0 1px 0 rgba(255,255,255,0.15) inset, 0 6px 14px -6px rgba(10,18,38,0.5); transition: transform .12s, box-shadow .12s, background .15s;" style-hover="background: linear-gradient(180deg, #213262 0%, #182548 100%); transform: translateY(-1px);" style-active="transform: translateY(1px) scale(0.97); box-shadow: 0 1px 0 rgba(255,255,255,0.1) inset, 0 2px 6px -2px rgba(10,18,38,0.5);">Agregar al pedido</button>
  </div>
</div>
]]>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:320,&quot;height&quot;:380},&quot;product&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;{name:string,brand:string,priceLabel:string,compareAtLabel?:string,discountLabel?:string,cuotaLabel:string,lowStockLabel?:string}&quot;}}"></script>
</body>
</html>
